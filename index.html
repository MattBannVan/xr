<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XR — Extended Reality Freestyle</title>
    <link rel="stylesheet" href="src/css/styles.css" />
    <!-- A-Frame WebXR framework -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="src/js/main.js"></script>
  </head>
  <body>
    <a-scene
      id="xr-scene"
      background="color: #1a1a2e"
      loading-screen="backgroundColor: #1a1a2e; dotsColor: #e94560"
    >
      <!-- Sky -->
      <a-sky color="#1a1a2e"></a-sky>

      <!-- Lighting -->
      <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
      <a-light
        type="directional"
        color="#ffffff"
        intensity="0.8"
        position="1 2 1"
      ></a-light>

      <!-- Floor grid -->
      <a-entity
        id="floor"
        geometry="primitive: plane; width: 30; height: 30"
        material="color: #0f3460; wireframe: true; opacity: 0.5"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-entity>

      <!-- Stage platform -->
      <a-cylinder
        id="platform"
        radius="2"
        height="0.1"
        color="#e94560"
        position="0 0 -4"
      ></a-cylinder>

      <!-- Central floating object -->
      <a-entity
        id="center-object"
        geometry="primitive: icosahedron; detail: 1; radius: 0.8"
        material="color: #e94560; metalness: 0.8; roughness: 0.2; emissive: #e94560; emissiveIntensity: 0.3"
        position="0 1.5 -4"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
        class="clickable"
        xr-pulse
      ></a-entity>

      <!-- Surrounding orbs -->
      <a-entity id="orbs">
        <a-sphere
          radius="0.3"
          color="#533483"
          position="2 1.2 -4"
          animation="property: position; to: 2 1.8 -4; loop: true; dir: alternate; dur: 2000; easing: easeInOutSine"
        ></a-sphere>
        <a-sphere
          radius="0.3"
          color="#533483"
          position="-2 1.2 -4"
          animation="property: position; to: -2 1.8 -4; loop: true; dir: alternate; dur: 2400; easing: easeInOutSine"
        ></a-sphere>
        <a-sphere
          radius="0.3"
          color="#533483"
          position="0 1.2 -6"
          animation="property: position; to: 0 1.8 -6; loop: true; dir: alternate; dur: 2200; easing: easeInOutSine"
        ></a-sphere>
        <a-sphere
          radius="0.3"
          color="#533483"
          position="0 1.2 -2"
          animation="property: position; to: 0 1.8 -2; loop: true; dir: alternate; dur: 1800; easing: easeInOutSine"
        ></a-sphere>
      </a-entity>

      <!-- Info text -->
      <a-text
        value="XR — Extended Reality Freestyle"
        align="center"
        color="#e94560"
        position="0 3 -5"
        scale="1.2 1.2 1.2"
      ></a-text>

      <a-text
        id="subtitle"
        value="Click the shape to interact"
        align="center"
        color="#ffffff"
        position="0 2.4 -5"
        scale="0.8 0.8 0.8"
      ></a-text>

      <!-- Camera rig with cursor -->
      <a-entity id="camera-rig" position="0 1.6 2">
        <a-camera>
          <a-cursor
            color="#e94560"
            animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
            animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
            animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1"
          ></a-cursor>
        </a-camera>
      </a-entity>
    </a-scene>

    <!-- 2D overlay UI -->
    <div id="ui-overlay">
      <div id="ui-header">
        <span class="logo">XR</span>
        <span class="tagline">Extended Reality Freestyle</span>
      </div>
      <div id="ui-controls">
        <button id="btn-vr" class="ui-btn">Enter VR</button>
      </div>
    </div>
  </body>
</html>
